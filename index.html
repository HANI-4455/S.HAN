<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사업지원팀 도구 모음</title>
<style>
  :root{
    --bg:#F7F5F1;
    --card:#FFFFFF;
    --ink:#1F1B16;
    --sub:#6B6258;
    --line:#E7E2DA;
    --accent:#C0602B;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    line-height:1.5;
  }
  header{
    max-width:960px;
    margin:0 auto;
    padding:56px 24px 32px;
  }
  header h1{
    font-size:28px;
    margin:0 0 8px;
    letter-spacing:-0.01em;
  }
  header p{
    margin:0;
    color:var(--sub);
    font-size:15px;
  }
  main{
    max-width:960px;
    margin:0 auto;
    padding:0 24px 80px;
  }
  section{
    margin-bottom:40px;
  }
  section h2{
    font-size:16px;
    font-weight:700;
    margin:0 0 14px;
    padding-bottom:10px;
    border-bottom:1px solid var(--line);
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(240px, 1fr));
    gap:12px;
  }
  a.card{
    display:block;
    background:var(--card);
    border:1px solid var(--line);
    border-radius:10px;
    padding:18px 20px;
    text-decoration:none;
    color:var(--ink);
    transition:border-color .15s ease, transform .15s ease;
  }
  a.card:hover{
    border-color:var(--accent);
    transform:translateY(-1px);
  }
  .card .title{
    font-size:15px;
    font-weight:600;
    margin-bottom:6px;
  }
  .card .desc{
    font-size:13px;
    color:var(--sub);
  }
  .empty{
    font-size:13px;
    color:var(--sub);
    padding:18px 0;
  }
</style>
</head>
<body>

<header>
  <h1>사업지원팀 도구 모음</h1>
  <p>업무에 쓰는 도구를 카테고리별로 모아둔 페이지입니다.</p>
</header>

<main>

  <section>
    <h2>🤖 AI 도구</h2>
    <div class="grid">
      <a class="card" href="meeting_recorder_2.html">
        <div class="title">🎙️ 회의 녹음 · AI 회의록</div>
        <div class="desc">음성을 실시간으로 텍스트 전사하고 AI가 회의 내용을 분석·요약합니다.</div>
      </a>
    </div>
  </section>

  <section>
    <h2>📄 보고자료</h2>
    <div class="grid">
      <div class="empty">추가 예정</div>
    </div>
  </section>

  <section>
    <h2>🗂️ 기타</h2>
    <div class="grid">
      <div class="empty">추가 예정</div>
    </div>
  </section>

</main>

</body>
</html>
