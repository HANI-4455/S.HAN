<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>뉴스 검색 · 카드 발송</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',sans-serif;background:#0f1117;color:#e2e8f0;min-height:100vh;}

header{background:linear-gradient(135deg,#1a1f2e,#16213e);border-bottom:1px solid #2d3748;padding:24px 40px;}
header h1{font-size:1.6rem;font-weight:700;color:#7c3aed;}
header p{color:#94a3b8;font-size:0.88rem;margin-top:4px;}

.search-bar{padding:20px 40px;background:#131720;border-bottom:1px solid #1e2535;display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.search-bar input[type=text]{flex:1;min-width:200px;background:#1e2535;border:1px solid #2d3748;border-radius:8px;padding:10px 16px;color:#e2e8f0;font-size:0.95rem;outline:none;}
.search-bar input[type=text]:focus{border-color:#7c3aed;}
.btn-search{padding:10px 22px;background:#7c3aed;color:#fff;border:none;border-radius:8px;font-size:0.9rem;font-weight:600;cursor:pointer;}
.btn-search:hover{background:#6d28d9;}

.filter-bar{padding:12px 40px;background:#0f1117;border-bottom:1px solid #1e2535;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.filter-label{font-size:0.8rem;color:#64748b;margin-right:4px;}
.chip{padding:5px 14px;border-radius:20px;border:1px solid #2d3748;background:#1e2535;color:#94a3b8;font-size:0.8rem;cursor:pointer;transition:all .15s;}
.chip:hover,.chip.on{background:#7c3aed;border-color:#7c3aed;color:#fff;}
.divider{width:1px;height:20px;background:#2d3748;margin:0 4px;}

.result-bar{padding:12px 40px;display:flex;align-items:center;gap:10px;}
.result-count{font-size:0.83rem;color:#64748b;}
.sel-count{font-size:0.83rem;color:#a78bfa;font-weight:600;}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;padding:0 40px 120px;}

.card{background:#1a1f2e;border:1px solid #2d3748;border-radius:12px;padding:18px;display:flex;flex-direction:column;gap:10px;transition:all .2s;position:relative;cursor:default;}
.card:hover{border-color:#4b5563;}
.card.selected{border-color:#7c3aed;background:#1e1a2e;}
.card-check{position:absolute;top:14px;right:14px;width:20px;height:20px;border-radius:5px;border:1.5px solid #374151;background:#0f1117;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.card-check.on{background:#7c3aed;border-color:#7c3aed;}
.card-check.on::after{content:'✓';color:#fff;font-size:12px;font-weight:700;}
.card-source{font-size:0.75rem;color:#7c3aed;font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
.card-title{font-size:0.95rem;font-weight:600;color:#f1f5f9;line-height:1.4;padding-right:28px;}
.card-title a{color:inherit;text-decoration:none;}
.card-title a:hover{color:#a78bfa;}
.card-desc{font-size:0.82rem;color:#64748b;line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.card-date{font-size:0.75rem;color:#475569;margin-top:auto;}

.loading{text-align:center;padding:60px;color:#64748b;}
.loading .spin{display:inline-block;width:28px;height:28px;border:3px solid #2d3748;border-top-color:#7c3aed;border-radius:50%;animation:spin .7s linear infinite;margin-bottom:12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{text-align:center;padding:60px;color:#374151;}
.empty .icon{font-size:2.5rem;margin-bottom:10px;}

/* 하단 액션바 */
.action-bar{position:fixed;bottom:0;left:0;right:0;background:#1a1f2e;border-top:1px solid #2d3748;padding:14px 40px;display:flex;align-items:center;gap:12px;transform:translateY(100%);transition:transform .25s;}
.action-bar.show{transform:translateY(0);}
.action-info{font-size:0.88rem;color:#94a3b8;}
.action-info b{color:#a78bfa;}
.btn-clear{padding:8px 16px;background:#1e2535;border:1px solid #2d3748;color:#94a3b8;border-radius:7px;font-size:0.85rem;cursor:pointer;}
.btn-email{margin-left:auto;padding:10px 22px;background:#7c3aed;color:#fff;border:none;border-radius:8px;font-size:0.9rem;font-weight:600;cursor:pointer;}
.btn-email:hover{background:#6d28d9;}

/* 모달 */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:#1a1f2e;border:1px solid #2d3748;border-radius:16px;padding:28px;width:520px;max-width:94vw;max-height:90vh;overflow-y:auto;}
.modal h2{font-size:1.1rem;font-weight:700;color:#f1f5f9;margin-bottom:20px;}
.modal-section{margin-bottom:20px;}
.modal-section label{display:block;font-size:0.8rem;color:#94a3b8;font-weight:600;margin-bottom:8px;}
.email-row{display:flex;gap:8px;margin-bottom:10px;}
.email-row input{flex:1;background:#0f1117;border:1px solid #2d3748;border-radius:8px;padding:9px 12px;color:#e2e8f0;font-size:0.88rem;outline:none;}
.email-row input:focus{border-color:#7c3aed;}
.btn-add{padding:9px 16px;background:#1e2535;border:1px solid #2d3748;color:#94a3b8;border-radius:8px;font-size:0.85rem;cursor:pointer;white-space:nowrap;}
.btn-add:hover{border-color:#7c3aed;color:#a78bfa;}
.email-list{display:flex;flex-direction:column;gap:6px;max-height:140px;overflow-y:auto;}
.email-item{display:flex;align-items:center;gap:8px;background:#0f1117;border:1px solid #1e2535;border-radius:7px;padding:8px 12px;}
.email-item .addr{flex:1;font-size:0.85rem;color:#e2e8f0;}
.email-item .chk{width:16px;height:16px;accent-color:#7c3aed;cursor:pointer;}
.email-item .del{background:none;border:none;color:#374151;cursor:pointer;font-size:1rem;padding:0;}
.email-item .del:hover{color:#f87171;}
.preview-box{background:#0f1117;border:1px solid #1e2535;border-radius:8px;padding:12px;max-height:160px;overflow-y:auto;font-size:0.8rem;color:#64748b;line-height:1.7;}
.preview-title{font-size:0.75rem;color:#475569;font-weight:600;margin-bottom:6px;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}
.btn-cancel{padding:9px 18px;background:#1e2535;border:1px solid #2d3748;color:#94a3b8;border-radius:8px;cursor:pointer;font-size:0.88rem;}
.btn-send{padding:9px 20px;background:#7c3aed;border:none;color:#fff;border-radius:8px;cursor:pointer;font-size:0.9rem;font-weight:600;}
.btn-send:hover{background:#6d28d9;}

@media(max-width:600px){
  header,.search-bar,.filter-bar,.result-bar,.grid,.action-bar{padding-left:16px;padding-right:16px;}
}
</style>
</head>
<body>

<header>
  <h1>📰 뉴스 검색 · 카드 발송</h1>
  <p>키워드로 뉴스를 검색하고 선택해서 이메일로 발송하세요</p>
</header>

<div class="search-bar">
  <input type="text" id="keyword" placeholder="검색어를 입력하세요 (예: SPC, 파리바게뜨)" onkeydown="if(event.key==='Enter')search()">
  <select id="source" style="background:#1e2535;border:1px solid #2d3748;border-radius:8px;padding:10px 14px;color:#e2e8f0;font-size:0.88rem;outline:none;">
    <option value="google">Google 뉴스</option>
    <option value="naver">네이버 뉴스</option>
  </select>
  <button class="btn-search" onclick="search()">🔍 검색</button>
</div>

<div class="filter-bar">
  <span class="filter-label">기간</span>
  <button class="chip on" data-period="" onclick="setPeriod(this,'')">전체</button>
  <button class="chip" data-period="1d" onclick="setPeriod(this,'1d')">오늘</button>
  <button class="chip" data-period="7d" onclick="setPeriod(this,'7d')">1주일</button>
  <button class="chip" data-period="1m" onclick="setPeriod(this,'1m')">1개월</button>
  <div class="divider"></div>
  <span class="filter-label">정렬</span>
  <button class="chip on" data-sort="date" onclick="setSort(this,'date')">최신순</button>
  <button class="chip" data-sort="rel" onclick="setSort(this,'rel')">관련순</button>
  <div class="divider"></div>
  <button class="chip" onclick="selectAll()" style="margin-left:4px">전체 선택</button>
  <button class="chip" onclick="clearSel()">선택 해제</button>
</div>

<div class="result-bar">
  <span class="result-count" id="resultCount"></span>
  <span class="sel-count" id="selCount"></span>
</div>

<div class="grid" id="grid">
  <div class="empty"><div class="icon">🔍</div><p>키워드를 입력하고 검색하세요</p></div>
</div>

<!-- 하단 액션바 -->
<div class="action-bar" id="actionBar">
  <div class="action-info"><b id="selNum">0</b>개 선택됨</div>
  <button class="btn-clear" onclick="clearSel()">선택 해제</button>
  <button class="btn-email" onclick="openEmailModal()">✉ 이메일 발송</button>
</div>

<!-- 이메일 모달 -->
<div class="overlay" id="overlay" onclick="closeIfBg(event)">
  <div class="modal">
    <h2>✉ 이메일 발송</h2>

    <div class="modal-section">
      <label>수신자 추가</label>
      <div class="email-row">
        <input type="email" id="newEmail" placeholder="이메일 주소 입력" onkeydown="if(event.key==='Enter')addEmail()">
        <button class="btn-add" onclick="addEmail()">+ 추가</button>
      </div>
      <div class="email-list" id="emailList"></div>
    </div>

    <div class="modal-section">
      <div class="preview-title">발송할 뉴스 (<span id="previewCount">0</span>건)</div>
      <div class="preview-box" id="previewBox"></div>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-send" onclick="sendEmail()">발송하기</button>
    </div>
  </div>
</div>

<script>
const PROXY = 'https://api.allorigins.win/get?url=';
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxzuvrTumy3nGRi3m7qTd6pLW2iez6jiLH070jf4IUIQs85fP_dlMPFNZdLJhP9Lmnl/exec';
let allNews = [], selected = new Set(), period = '', sortMode = 'date';
let emails = JSON.parse(localStorage.getItem('news_emails') || '[]');

function setPeriod(btn, val) {
  period = val;
  document.querySelectorAll('[data-period]').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  renderCards(allNews);
}
function setSort(btn, val) {
  sortMode = val;
  document.querySelectorAll('[data-sort]').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  renderCards(allNews);
}

async function search() {
  const kw = document.getElementById('keyword').value.trim();
  if (!kw) { alert('검색어를 입력하세요.'); return; }
  const src = document.getElementById('source').value;
  selected.clear(); updateActionBar();
  document.getElementById('grid').innerHTML = '<div class="loading"><div class="spin"></div><p>뉴스를 불러오는 중...</p></div>';
  document.getElementById('resultCount').textContent = '';
  try {
    if (src === 'google') allNews = await fetchGoogle(kw);
    else allNews = await fetchNaver(kw);
    renderCards(allNews);
  } catch(e) {
    document.getElementById('grid').innerHTML = `<div class="empty"><div class="icon">⚠️</div><p>불러오기 실패: ${e.message}<br><small style="color:#475569">잠시 후 다시 시도하세요</small></p></div>`;
  }
}

async function fetchGoogle(kw) {
  const periodParam = period === '1d' ? 'when:1d' : period === '7d' ? 'when:7d' : period === '1m' ? 'when:1m' : '';
  const q = encodeURIComponent(kw + (periodParam ? ' ' + periodParam : ''));
  const sort = sortMode === 'date' ? '&scoring=n' : '';
  const rss = `https://news.google.com/rss/search?q=${q}&hl=ko&gl=KR&ceid=KR:ko${sort}`;
  const res = await fetch(PROXY + encodeURIComponent(rss));
  const json = await res.json();
  const parser = new DOMParser();
  const xml = parser.parseFromString(json.contents, 'text/xml');
  const items = [...xml.querySelectorAll('item')];
  return items.map((item, i) => ({
    id: i,
    title: item.querySelector('title')?.textContent || '',
    link: item.querySelector('link')?.textContent || '',
    source: item.querySelector('source')?.textContent || 'Google 뉴스',
    desc: stripHtml(item.querySelector('description')?.textContent || ''),
    date: new Date(item.querySelector('pubDate')?.textContent || ''),
  }));
}

async function fetchNaver(kw) {
  const sort = sortMode === 'date' ? 'date' : 'sim';
  const res = await fetch(SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ action: 'naver_news', keyword: kw, display: 30, sort })
  });
  const json = await res.json();
  if (!json.ok) throw new Error(json.error || '네이버 뉴스 오류');
  return json.items.map((item, i) => ({
    id: 'n' + i,
    title: stripHtml(item.title),
    link: item.originallink || item.link,
    source: new URL(item.originallink || item.link).hostname.replace('www.',''),
    desc: stripHtml(item.description),
    date: new Date(item.pubDate),
  }));
}

function stripHtml(s) {
  return s.replace(/<[^>]*>/g,'').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&').replace(/&#39;/g,"'").replace(/&quot;/g,'"').trim();
}

function filterByPeriod(items) {
  if (!period) return items;
  const now = Date.now();
  const ms = period === '1d' ? 86400000 : period === '7d' ? 604800000 : 2592000000;
  return items.filter(n => (now - n.date.getTime()) < ms);
}

function sortItems(items) {
  if (sortMode === 'date') return [...items].sort((a,b) => b.date - a.date);
  return items;
}

function formatDate(d) {
  if (isNaN(d)) return '';
  const diff = Math.floor((Date.now() - d) / 60000);
  if (diff < 60) return `${diff}분 전`;
  if (diff < 1440) return `${Math.floor(diff/60)}시간 전`;
  return `${Math.floor(diff/1440)}일 전`;
}

function renderCards(items) {
  let list = sortItems(filterByPeriod(items));
  document.getElementById('resultCount').textContent = `검색결과 ${list.length}건`;
  if (!list.length) {
    document.getElementById('grid').innerHTML = '<div class="empty"><div class="icon">📭</div><p>검색 결과가 없습니다</p></div>';
    return;
  }
  document.getElementById('grid').innerHTML = list.map(n => `
    <div class="card ${selected.has(n.id)?'selected':''}" id="card-${n.id}">
      <div class="card-check ${selected.has(n.id)?'on':''}" onclick="toggleCard(${n.id})"></div>
      <div class="card-source">${n.source}</div>
      <div class="card-title"><a href="${n.link}" target="_blank">${n.title}</a></div>
      <div class="card-desc">${n.desc}</div>
      <div class="card-date">${formatDate(n.date)}</div>
    </div>`).join('');
  updateSelCount();
}

function toggleCard(id) {
  if (selected.has(id)) selected.delete(id);
  else selected.add(id);
  const card = document.getElementById('card-'+id);
  if (card) {
    card.classList.toggle('selected', selected.has(id));
    card.querySelector('.card-check').classList.toggle('on', selected.has(id));
  }
  updateActionBar(); updateSelCount();
}

function selectAll() {
  filterByPeriod(allNews).forEach(n => selected.add(n.id));
  renderCards(allNews); updateActionBar();
}
function clearSel() {
  selected.clear(); renderCards(allNews); updateActionBar();
}
function updateActionBar() {
  const bar = document.getElementById('actionBar');
  bar.classList.toggle('show', selected.size > 0);
  document.getElementById('selNum').textContent = selected.size;
}
function updateSelCount() {
  const el = document.getElementById('selCount');
  el.textContent = selected.size > 0 ? `· ${selected.size}개 선택됨` : '';
}

// ── 이메일 모달 ──
function openEmailModal() {
  if (!selected.size) { alert('뉴스를 먼저 선택하세요.'); return; }
  renderEmailList();
  renderPreview();
  document.getElementById('overlay').classList.add('open');
}
function closeModal() { document.getElementById('overlay').classList.remove('open'); }
function closeIfBg(e) { if (e.target === document.getElementById('overlay')) closeModal(); }

function saveEmails() { localStorage.setItem('news_emails', JSON.stringify(emails)); }

function addEmail() {
  const val = document.getElementById('newEmail').value.trim();
  if (!val || !val.includes('@')) { alert('올바른 이메일 주소를 입력하세요.'); return; }
  if (emails.find(e => e.addr === val)) { alert('이미 추가된 주소입니다.'); return; }
  emails.push({ addr: val, checked: true });
  saveEmails(); renderEmailList();
  document.getElementById('newEmail').value = '';
}

function removeEmail(addr) {
  emails = emails.filter(e => e.addr !== addr);
  saveEmails(); renderEmailList();
}

function toggleEmailCheck(addr, chk) {
  const found = emails.find(e => e.addr === addr);
  if (found) { found.checked = chk; saveEmails(); }
}

function renderEmailList() {
  const list = document.getElementById('emailList');
  if (!emails.length) { list.innerHTML = '<p style="font-size:.8rem;color:#475569;padding:8px 0">저장된 수신자가 없습니다. 위에서 추가하세요.</p>'; return; }
  list.innerHTML = emails.map(e => `
    <div class="email-item">
      <input type="checkbox" class="chk" ${e.checked?'checked':''} onchange="toggleEmailCheck('${e.addr}',this.checked)">
      <span class="addr">${e.addr}</span>
      <button class="del" onclick="removeEmail('${e.addr}')">✕</button>
    </div>`).join('');
}

function renderPreview() {
  const sel = allNews.filter(n => selected.has(n.id));
  document.getElementById('previewCount').textContent = sel.length;
  document.getElementById('previewBox').innerHTML = sel.map((n,i) =>
    `<div style="margin-bottom:8px"><b style="color:#94a3b8">${i+1}.</b> <a href="${n.link}" target="_blank" style="color:#a78bfa;text-decoration:none">${n.title}</a><br><span style="color:#475569;font-size:.75rem">${n.source} · ${formatDate(n.date)}</span></div>`
  ).join('');
}

async function sendEmail() {
  const to = emails.filter(e => e.checked).map(e => e.addr);
  if (!to.length) { alert('수신자를 선택하세요.'); return; }
  const sel = allNews.filter(n => selected.has(n.id));
  const kw = document.getElementById('keyword').value.trim();
  const subject = `[뉴스 클리핑] ${kw} — ${new Date().toLocaleDateString('ko-KR')}`;

  const body = `안녕하세요, 사업지원팀입니다.\n\n「${kw}」 관련 주요 뉴스를 공유드립니다.\n\n`
    + sel.map((n,i) => `${i+1}. ${n.title}\n   출처: ${n.source}\n   링크: ${n.link}\n`).join('\n')
    + `\n\n감사합니다.`;

  const htmlBody = `<p>안녕하세요, <b>사업지원팀</b>입니다.</p>
<p>「${kw}」 관련 주요 뉴스를 공유드립니다.</p><br>
<table style="border-collapse:collapse;width:100%">
${sel.map((n,i) => `
  <tr>
    <td style="padding:10px;border-bottom:1px solid #eee;vertical-align:top;color:#888;width:24px">${i+1}</td>
    <td style="padding:10px;border-bottom:1px solid #eee">
      <a href="${n.link}" style="font-weight:bold;color:#1a56db;text-decoration:none">${n.title}</a><br>
      <span style="font-size:12px;color:#888">${n.source} · ${formatDate(n.date)}</span>
    </td>
  </tr>`).join('')}
</table><br><p>감사합니다.</p>`;

  const btn = document.querySelector('.btn-send');
  btn.disabled = true; btn.textContent = '발송 중…';

  try {
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'send_email', to, subject, body, htmlBody })
    });
    const json = await res.json();
    if (json.ok) {
      closeModal();
      alert(`✅ ${to.length}명에게 발송 완료!`);
    } else {
      alert('발송 실패: ' + (json.error || '알 수 없는 오류'));
    }
  } catch(e) {
    alert('발송 실패: ' + e.message);
  } finally {
    btn.disabled = false; btn.textContent = '발송하기';
  }
}
</script>
</body>
</html>
