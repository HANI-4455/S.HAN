<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>뉴스 검색 · 카드 발송</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #15237A;
  --secondary: #2F497D;
  --accent: #F26300;
  --text: #272727;
  --bg: #F8F8F8;
  --card: #FFFFFF;
  --border: #D1D8E8;
  --muted: #6B7280;
  --light: #EEF1F9;
  --radius: 6px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── 헤더 ── */
.site-header {
  background: #fff;
  border-bottom: 1px solid var(--border);
  padding: 0 40px;
  display: flex; align-items: center; justify-content: space-between;
  height: 60px;
}
.brand { display: flex; align-items: center; gap: 10px; }
.brand-mark {
  width: 30px; height: 30px; background: var(--primary);
  border-radius: 3px; display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 12px; font-weight: 700; letter-spacing: -0.5px;
}
.brand-name { font-size: 15px; font-weight: 700; color: var(--primary); }
.back-link {
  font-size: 12px; color: var(--muted); text-decoration: none; font-weight: 600;
}
.back-link:hover { color: var(--primary); }

/* ── 히어로 ── */
.hero {
  background: var(--primary);
  padding: 28px 40px 26px;
}
.hero-eyebrow {
  display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
}
.hero-eyebrow .lo { width: 20px; height: 2px; background: var(--accent); }
.hero-eyebrow .lb { width: 48px; height: 1px; background: rgba(255,255,255,0.25); }
.hero-eyebrow span { font-size: 10px; font-weight: 600; color: rgba(255,255,255,0.5); letter-spacing: 0.12em; text-transform: uppercase; }
.hero h1 { font-size: 22px; font-weight: 700; color: #fff; letter-spacing: -0.3px; }
.hero p { font-size: 13px; color: rgba(255,255,255,0.55); font-weight: 300; margin-top: 4px; }

/* ── 검색 바 ── */
.search-section {
  background: #fff;
  border-bottom: 1px solid var(--border);
  padding: 16px 40px;
}
.search-row {
  display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
  margin-bottom: 12px;
}
.search-input {
  flex: 1; min-width: 200px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 16px;
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
  outline: none;
  transition: border-color .2s;
}
.search-input:focus { border-color: var(--primary); background: #fff; }
.search-input::placeholder { color: #B0B8C8; }
.source-select {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 14px;
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
  outline: none;
  cursor: pointer;
}
.source-select:focus { border-color: var(--primary); }
.btn-search {
  padding: 10px 24px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: opacity .15s;
  white-space: nowrap;
}
.btn-search:hover { opacity: .88; }

/* ── 필터 칩 ── */
.filter-row {
  display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
}
.filter-label { font-size: 11px; color: var(--muted); font-weight: 700; margin-right: 2px; letter-spacing: 0.05em; text-transform: uppercase; }
.chip {
  padding: 5px 13px;
  border-radius: 3px;
  border: 1px solid var(--border);
  background: #fff;
  color: var(--muted);
  font-size: 12px;
  font-family: inherit;
  font-weight: 600;
  cursor: pointer;
  transition: all .15s;
}
.chip:hover { border-color: var(--primary); color: var(--primary); }
.chip.on { background: var(--primary); border-color: var(--primary); color: #fff; }
.chip.outline { border-color: var(--secondary); color: var(--secondary); }
.chip.outline:hover { background: var(--secondary); color: #fff; }
.divider-v { width: 1px; height: 18px; background: var(--border); margin: 0 2px; }

/* ── 결과 바 ── */
.result-bar {
  padding: 12px 40px;
  display: flex; align-items: center; gap: 10px;
  border-bottom: 1px solid var(--border);
  background: #fff;
}
.result-count { font-size: 12px; color: var(--muted); font-weight: 600; }
.sel-count { font-size: 12px; color: var(--accent); font-weight: 700; }

/* ── 그리드 ── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 16px;
  padding: 24px 40px 120px;
}

/* ── 뉴스 카드 ── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  display: flex; flex-direction: column; gap: 8px;
  transition: box-shadow .2s, border-color .2s;
  cursor: pointer;
  position: relative;
}
.card:hover { border-color: var(--secondary); box-shadow: 0 4px 16px rgba(21,35,122,0.07); }
.card.selected { border-color: var(--accent); border-width: 1.5px; }

.card-check {
  position: absolute; top: 14px; right: 14px;
  width: 20px; height: 20px;
  border-radius: 4px;
  border: 1.5px solid var(--border);
  background: var(--bg);
  display: flex; align-items: center; justify-content: center;
  transition: all .15s; flex-shrink: 0;
}
.card-check.on { background: var(--accent); border-color: var(--accent); }
.card-check.on::after { content: '✓'; color: #fff; font-size: 11px; font-weight: 700; }

.card-source {
  font-size: 10px; color: var(--accent); font-weight: 700;
  text-transform: uppercase; letter-spacing: .06em;
}
.card-title {
  font-size: 14px; font-weight: 700; color: var(--primary);
  line-height: 1.45; padding-right: 28px;
}
.card-title a { color: inherit; text-decoration: none; }
.card-title a:hover { color: var(--secondary); }
.card-desc {
  font-size: 12px; color: var(--muted); line-height: 1.6; font-weight: 300;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}
.card-date { font-size: 11px; color: #B0B8C8; margin-top: auto; font-weight: 400; }

/* ── 상태 표시 ── */
.loading { text-align: center; padding: 60px; color: var(--muted); grid-column: 1/-1; }
.loading .spin {
  display: inline-block; width: 28px; height: 28px;
  border: 2px solid var(--border); border-top-color: var(--accent);
  border-radius: 50%; animation: spin .7s linear infinite; margin-bottom: 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.empty { text-align: center; padding: 60px; color: var(--muted); grid-column: 1/-1; }
.empty .icon { font-size: 2rem; margin-bottom: 10px; opacity: .4; }
.empty p { font-size: 13px; font-weight: 300; }

/* ── 하단 액션바 ── */
.action-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--primary);
  border-top: 3px solid var(--accent);
  padding: 14px 40px;
  display: flex; align-items: center; gap: 12px;
  transform: translateY(100%); transition: transform .25s;
  z-index: 100;
}
.action-bar.show { transform: translateY(0); }
.action-info { font-size: 13px; color: rgba(255,255,255,0.7); font-weight: 600; }
.action-info b { color: #fff; }
.btn-clear {
  padding: 8px 16px;
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.8);
  border-radius: var(--radius);
  font-size: 12px; font-family: inherit; font-weight: 600; cursor: pointer;
}
.btn-clear:hover { background: rgba(255,255,255,0.18); }
.btn-email {
  margin-left: auto;
  padding: 10px 24px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-size: 13px; font-weight: 700; font-family: inherit; cursor: pointer;
  transition: opacity .15s;
}
.btn-email:hover { opacity: .88; }

/* ── 이메일 모달 ── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(21,35,122,0.3);
  z-index: 200; display: none;
  align-items: center; justify-content: center;
}
.overlay.open { display: flex; }
.modal {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 32px;
  width: 520px; max-width: 94vw; max-height: 90vh; overflow-y: auto;
  box-shadow: 0 20px 60px rgba(21,35,122,0.15);
}
.modal-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
.modal-header .num { font-size: 22px; font-weight: 700; color: var(--accent); }
.modal h2 { font-size: 18px; font-weight: 700; color: var(--primary); }
.modal-divider { display: flex; margin-bottom: 22px; }
.modal-divider .do { width: 24px; height: 2px; background: var(--accent); }
.modal-divider .db { width: 80px; height: 1px; background: var(--border); }

.modal-section { margin-bottom: 20px; }
.modal-section > label {
  display: block; font-size: 10px; color: var(--muted);
  font-weight: 700; margin-bottom: 8px;
  text-transform: uppercase; letter-spacing: .06em;
}
.email-row { display: flex; gap: 8px; margin-bottom: 10px; }
.email-row input {
  flex: 1;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 9px 12px;
  color: var(--text); font-size: 13px; font-family: inherit; outline: none;
}
.email-row input:focus { border-color: var(--primary); background: #fff; }
.btn-add {
  padding: 9px 16px;
  background: var(--light); border: 1px solid var(--border);
  color: var(--secondary); border-radius: var(--radius);
  font-size: 12px; font-family: inherit; font-weight: 700; cursor: pointer; white-space: nowrap;
}
.btn-add:hover { border-color: var(--primary); color: var(--primary); }
.email-list { display: flex; flex-direction: column; gap: 6px; max-height: 140px; overflow-y: auto; }
.email-item {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 8px 12px;
}
.email-item .addr { flex: 1; font-size: 13px; color: var(--text); }
.email-item .chk { width: 15px; height: 15px; accent-color: var(--primary); cursor: pointer; }
.email-item .del { background: none; border: none; color: #C4C9D8; cursor: pointer; font-size: 13px; padding: 0; font-family: inherit; }
.email-item .del:hover { color: #EF4444; }
.preview-title { font-size: 10px; color: var(--muted); font-weight: 700; margin-bottom: 8px; text-transform: uppercase; letter-spacing: .06em; }
.preview-box {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 12px;
  max-height: 160px; overflow-y: auto;
  font-size: 12px; color: var(--muted); line-height: 1.7; font-weight: 300;
}
.modal-actions {
  display: flex; gap: 10px; justify-content: flex-end;
  margin-top: 20px; padding-top: 16px; border-top: 1px solid #F0F2F8;
}
.btn-cancel {
  padding: 9px 20px; background: #fff; border: 1px solid var(--border);
  color: var(--muted); border-radius: var(--radius); cursor: pointer;
  font-size: 13px; font-family: inherit; font-weight: 600;
}
.btn-cancel:hover { border-color: var(--secondary); color: var(--secondary); }
.btn-send {
  padding: 9px 22px; background: var(--accent); border: none;
  color: #fff; border-radius: var(--radius); cursor: pointer;
  font-size: 13px; font-weight: 700; font-family: inherit;
  transition: opacity .15s;
}
.btn-send:hover { opacity: .88; }
.btn-send:disabled { opacity: .45; cursor: not-allowed; }

@media(max-width:600px) {
  .site-header, .hero, .search-section, .result-bar, .action-bar { padding-left: 16px; padding-right: 16px; }
  .grid { padding: 16px 16px 120px; }
}
</style>
</head>
<body>

<!-- 헤더 -->
<header class="site-header">
  <div class="brand">
    <div class="brand-mark">PC</div>
    <span class="brand-name">Paris Croissant</span>
  </div>
  <a class="back-link" href="index.html">← 허브로 돌아가기</a>
</header>

<!-- 히어로 -->
<div class="hero">
  <div class="hero-eyebrow">
    <div class="lo"></div><div class="lb"></div>
    <span>News</span>
  </div>
  <h1>뉴스 검색 · 카드 발송</h1>
  <p>키워드로 뉴스를 검색하고 선택해서 이메일로 발송하세요</p>
</div>

<!-- 검색 -->
<div class="search-section">
  <div class="search-row">
    <input class="search-input" type="text" id="keyword"
      placeholder="검색어를 입력하세요 (예: 파스쿠찌, 파리바게뜨)"
      onkeydown="if(event.key==='Enter')search()">
    <select class="source-select" id="source">
      <option value="google">Google 뉴스</option>
      <option value="naver">네이버 뉴스</option>
    </select>
    <button class="btn-search" onclick="search()">검색</button>
  </div>
  <div class="filter-row">
    <span class="filter-label">기간</span>
    <button class="chip on" data-period="" onclick="setPeriod(this,'')">전체</button>
    <button class="chip" data-period="1d" onclick="setPeriod(this,'1d')">오늘</button>
    <button class="chip" data-period="7d" onclick="setPeriod(this,'7d')">1주일</button>
    <button class="chip" data-period="1m" onclick="setPeriod(this,'1m')">1개월</button>
    <div class="divider-v"></div>
    <span class="filter-label">정렬</span>
    <button class="chip on" data-sort="date" onclick="setSort(this,'date')">최신순</button>
    <button class="chip" data-sort="rel" onclick="setSort(this,'rel')">관련순</button>
    <div class="divider-v"></div>
    <button class="chip outline" onclick="selectAll()">전체 선택</button>
    <button class="chip outline" onclick="clearSel()">선택 해제</button>
  </div>
</div>

<!-- 결과 바 -->
<div class="result-bar">
  <span class="result-count" id="resultCount"></span>
  <span class="sel-count" id="selCount"></span>
</div>

<!-- 카드 그리드 -->
<div class="grid" id="grid">
  <div class="empty">
    <div class="icon">🔍</div>
    <p>키워드를 입력하고 검색하세요</p>
  </div>
</div>

<!-- 하단 액션바 -->
<div class="action-bar" id="actionBar">
  <div class="action-info"><b id="selNum">0</b>개 선택됨</div>
  <button class="btn-clear" onclick="clearSel()">선택 해제</button>
  <button class="btn-email" onclick="openEmailModal()">✉ 이메일 발송</button>
</div>

<!-- 이메일 모달 -->
<div class="overlay" id="overlay" onclick="closeIfBg(event)">
  <div class="modal">
    <div class="modal-header">
      <span class="num">✉</span>
      <h2>이메일 발송</h2>
    </div>
    <div class="modal-divider"><div class="do"></div><div class="db"></div></div>

    <div class="modal-section">
      <label>수신자 추가</label>
      <div class="email-row">
        <input type="email" id="newEmail" placeholder="이메일 주소 입력" onkeydown="if(event.key==='Enter')addEmail()">
        <button class="btn-add" onclick="addEmail()">+ 추가</button>
      </div>
      <div class="email-list" id="emailList"></div>
    </div>

    <div class="modal-section">
      <div class="preview-title">발송할 뉴스 (<span id="previewCount">0</span>건)</div>
      <div class="preview-box" id="previewBox"></div>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-send" onclick="sendEmail()">발송하기</button>
    </div>
  </div>
</div>

<script>
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxzuvrTumy3nGRi3m7qTd6pLW2iez6jiLH070jf4IUIQs85fP_dlMPFNZdLJhP9Lmnl/exec';
const PROXIES = ['https://corsproxy.io/?','https://api.allorigins.win/get?url='];
let allNews = [], selected = new Set(), period = '', sortMode = 'date';
let emails = JSON.parse(localStorage.getItem('news_emails') || '[]');

function setPeriod(btn, val) {
  period = val;
  document.querySelectorAll('[data-period]').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  renderCards(allNews);
}
function setSort(btn, val) {
  sortMode = val;
  document.querySelectorAll('[data-sort]').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  renderCards(allNews);
}

async function search() {
  const kw = document.getElementById('keyword').value.trim();
  if (!kw) { alert('검색어를 입력하세요.'); return; }
  const src = document.getElementById('source').value;
  selected.clear(); updateActionBar();
  document.getElementById('grid').innerHTML = '<div class="loading"><div class="spin"></div><p>뉴스를 불러오는 중...</p></div>';
  document.getElementById('resultCount').textContent = '';
  try {
    const raw = src === 'google' ? await fetchGoogle(kw) : await fetchNaver(kw);
    allNews = raw.map((item, i) => ({ ...item, id: i }));
    renderCards(allNews);
  } catch(e) {
    document.getElementById('grid').innerHTML =
      `<div class="empty"><div class="icon">⚠️</div><p>불러오기 실패: ${e.message}<br><small>잠시 후 다시 시도하세요</small></p></div>`;
  }
}

async function fetchGoogle(kw) {
  const periodParam = period==='1d'?'when:1d':period==='7d'?'when:7d':period==='1m'?'when:1m':'';
  const q = encodeURIComponent(kw + (periodParam ? ' '+periodParam : ''));
  const rss = `https://news.google.com/rss/search?q=${q}&hl=ko&gl=KR&ceid=KR:ko`;
  let text = '';
  for (const proxy of PROXIES) {
    try {
      const res = await fetch(proxy + encodeURIComponent(rss), { signal: AbortSignal.timeout(7000) });
      if (!res.ok) continue;
      const data = await res.json();
      text = data.contents || data;
      if (typeof text !== 'string') text = await res.text();
      if (text && text.includes('<item>')) break;
    } catch(_) { continue; }
  }
  if (!text || !text.includes('<item>')) throw new Error('Google 뉴스를 불러올 수 없습니다');
  const xml = new DOMParser().parseFromString(text, 'text/xml');
  return [...xml.querySelectorAll('item')].map(item => {
    const linkNode = item.querySelector('link');
    const link = linkNode?.nextSibling?.nodeValue?.trim()
      || linkNode?.textContent?.trim()
      || item.querySelector('guid')?.textContent?.trim() || '';
    return {
      title: item.querySelector('title')?.textContent || '',
      link,
      source: item.querySelector('source')?.textContent || 'Google 뉴스',
      desc: stripHtml(item.querySelector('description')?.textContent || ''),
      date: new Date(item.querySelector('pubDate')?.textContent || ''),
    };
  });
}

async function fetchNaver(kw) {
  const sort = sortMode === 'date' ? 'date' : 'sim';
  const res = await fetch(SCRIPT_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ action: 'naver_news', keyword: kw, display: 30, sort })
  });
  const json = await res.json();
  if (!json.ok) throw new Error(json.error || '네이버 뉴스 오류');
  return json.items.map(item => {
    let source = '';
    try { source = new URL(item.originallink||item.link).hostname.replace('www.',''); } catch(_) {}
    return {
      title: stripHtml(item.title),
      link: item.originallink || item.link,
      source,
      desc: stripHtml(item.description),
      date: new Date(item.pubDate),
    };
  });
}

function stripHtml(s) {
  return (s||'').replace(/<[^>]*>/g,'').replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&amp;/g,'&').replace(/&#39;/g,"'").replace(/&quot;/g,'"').trim();
}
function filterByPeriod(items) {
  if (!period) return items;
  const ms = period==='1d'?86400000:period==='7d'?604800000:2592000000;
  return items.filter(n => (Date.now()-n.date.getTime()) < ms);
}
function sortItems(items) {
  return sortMode==='date' ? [...items].sort((a,b)=>b.date-a.date) : items;
}
function formatDate(d) {
  if (!d||isNaN(d)) return '';
  const diff = Math.floor((Date.now()-d)/60000);
  if (diff<60) return diff+'분 전';
  if (diff<1440) return Math.floor(diff/60)+'시간 전';
  return Math.floor(diff/1440)+'일 전';
}

function renderCards(items) {
  const list = sortItems(filterByPeriod(items));
  document.getElementById('resultCount').textContent = `검색결과 ${list.length}건`;
  if (!list.length) {
    document.getElementById('grid').innerHTML='<div class="empty"><div class="icon">📭</div><p>검색 결과가 없습니다</p></div>';
    return;
  }
  document.getElementById('grid').innerHTML = list.map(n => `
    <div class="card ${selected.has(n.id)?'selected':''}" id="card-${n.id}" onclick="toggleCard(${n.id})">
      <div class="card-check ${selected.has(n.id)?'on':''}"></div>
      <div class="card-source">${n.source}</div>
      <div class="card-title"><a href="${n.link}" target="_blank" onclick="event.stopPropagation()">${n.title}</a></div>
      <div class="card-desc">${n.desc}</div>
      <div class="card-date">${formatDate(n.date)}</div>
    </div>`).join('');
  updateSelCount();
}

function toggleCard(id) {
  if (selected.has(id)) selected.delete(id); else selected.add(id);
  const card = document.getElementById('card-'+id);
  if (card) {
    card.classList.toggle('selected', selected.has(id));
    card.querySelector('.card-check').classList.toggle('on', selected.has(id));
  }
  updateActionBar(); updateSelCount();
}
function selectAll() { filterByPeriod(allNews).forEach(n=>selected.add(n.id)); renderCards(allNews); updateActionBar(); }
function clearSel()  { selected.clear(); renderCards(allNews); updateActionBar(); }
function updateActionBar() {
  document.getElementById('actionBar').classList.toggle('show', selected.size>0);
  document.getElementById('selNum').textContent = selected.size;
}
function updateSelCount() {
  document.getElementById('selCount').textContent = selected.size>0 ? `· ${selected.size}개 선택됨` : '';
}

function openEmailModal() {
  if (!selected.size) { alert('뉴스를 먼저 선택하세요.'); return; }
  renderEmailList(); renderPreview();
  document.getElementById('overlay').classList.add('open');
}
function closeModal() { document.getElementById('overlay').classList.remove('open'); }
function closeIfBg(e) { if(e.target===document.getElementById('overlay')) closeModal(); }
function saveEmails() { localStorage.setItem('news_emails', JSON.stringify(emails)); }

function addEmail() {
  const val = document.getElementById('newEmail').value.trim();
  if (!val||!val.includes('@')) { alert('올바른 이메일 주소를 입력하세요.'); return; }
  if (emails.find(e=>e.addr===val)) { alert('이미 추가된 주소입니다.'); return; }
  emails.push({ addr:val, checked:true });
  saveEmails(); renderEmailList();
  document.getElementById('newEmail').value='';
}
function removeEmail(addr) { emails=emails.filter(e=>e.addr!==addr); saveEmails(); renderEmailList(); }
function toggleEmailCheck(addr,chk) { const f=emails.find(e=>e.addr===addr); if(f){f.checked=chk;saveEmails();} }

function renderEmailList() {
  const list = document.getElementById('emailList');
  if (!emails.length) { list.innerHTML='<p style="font-size:12px;color:var(--muted);padding:8px 0;font-weight:300">저장된 수신자가 없습니다.</p>'; return; }
  list.innerHTML = emails.map(e=>`
    <div class="email-item">
      <input type="checkbox" class="chk" ${e.checked?'checked':''} onchange="toggleEmailCheck('${e.addr}',this.checked)">
      <span class="addr">${e.addr}</span>
      <button class="del" onclick="removeEmail('${e.addr}')">✕</button>
    </div>`).join('');
}

function renderPreview() {
  const sel = allNews.filter(n=>selected.has(n.id));
  document.getElementById('previewCount').textContent = sel.length;
  document.getElementById('previewBox').innerHTML = sel.map((n,i)=>
    `<div style="margin-bottom:8px">
      <span style="color:var(--accent);font-weight:700;font-size:11px">${i+1}</span>
      <a href="${n.link}" target="_blank" style="color:var(--primary);text-decoration:none;font-weight:600;font-size:12px"> ${n.title}</a><br>
      <span style="color:#B0B8C8;font-size:11px">${n.source} · ${formatDate(n.date)}</span>
    </div>`
  ).join('');
}

async function sendEmail() {
  const to = emails.filter(e=>e.checked).map(e=>e.addr);
  if (!to.length) { alert('수신자를 선택하세요.'); return; }
  const sel = allNews.filter(n=>selected.has(n.id));
  const kw  = document.getElementById('keyword').value.trim();
  const btn = document.querySelector('.btn-send');
  btn.disabled=true; btn.textContent='AI 요약 중…';

  let summary = '';
  try {
    const sRes = await fetch(SCRIPT_URL, {
      method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({ action:'summarize_news', keyword:kw,
        articles: sel.map(n=>({title:n.title, source:n.source})) })
    });
    const sJson = await sRes.json();
    if (sJson.ok) summary = sJson.summary;
  } catch(_) {}

  btn.textContent='발송 중…';
  const subject = `[뉴스 클리핑] ${kw} — ${new Date().toLocaleDateString('ko-KR')}`;
  const body = `안녕하세요, 사업지원팀입니다.\n\n`
    + (summary ? `[ AI 요약 ]\n${summary}\n\n` : '')
    + `「${kw}」 관련 주요 뉴스 ${sel.length}건을 공유드립니다.\n\n`
    + sel.map((n,i)=>`${i+1}. ${n.title}\n   출처: ${n.source}\n   링크: ${n.link}`).join('\n\n')
    + `\n\n감사합니다.`;

  const htmlBody = `
<div style="font-family:'Noto Sans KR',sans-serif;max-width:680px;margin:0 auto;color:#272727">
  <div style="background:#15237A;padding:20px 28px;border-radius:6px 6px 0 0">
    <p style="color:rgba(255,255,255,0.5);font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin:0 0 6px">NEWS CLIPPING</p>
    <p style="color:#fff;font-size:18px;font-weight:700;margin:0">「${kw}」 뉴스 클리핑</p>
    <p style="color:rgba(255,255,255,0.5);font-size:12px;margin:4px 0 0">${new Date().toLocaleDateString('ko-KR')} · ${sel.length}건</p>
  </div>
  <div style="background:#fff;border:1px solid #D1D8E8;border-top:none;border-radius:0 0 6px 6px;padding:24px 28px">
    ${summary ? `
    <div style="background:#EEF1F9;border-left:3px solid #F26300;padding:14px 16px;border-radius:4px;margin-bottom:20px">
      <p style="font-size:10px;color:#F26300;font-weight:700;letter-spacing:.08em;text-transform:uppercase;margin:0 0 7px">AI 요약</p>
      <p style="margin:0;line-height:1.7;font-size:14px;color:#272727">${summary}</p>
    </div>` : ''}
    <p style="font-size:13px;color:#6B7280;margin:0 0 16px">총 <b style="color:#15237A">${sel.length}건</b>의 뉴스를 정리했습니다.</p>
    <table style="border-collapse:collapse;width:100%">
      ${sel.map((n,i)=>`
      <tr>
        <td style="padding:12px 8px;border-bottom:1px solid #F0F2F8;vertical-align:top;width:24px">
          <span style="color:#F26300;font-weight:700;font-size:13px">${i+1}</span>
        </td>
        <td style="padding:12px 8px;border-bottom:1px solid #F0F2F8">
          <a href="${n.link}" style="font-weight:700;color:#15237A;text-decoration:none;font-size:14px;line-height:1.4">${n.title}</a><br>
          <span style="font-size:11px;color:#B0B8C8">${n.source} · ${formatDate(n.date)}</span>
          ${n.desc?`<p style="font-size:12px;color:#6B7280;margin:4px 0 0;line-height:1.5;font-weight:300">${n.desc.slice(0,120)}…</p>`:''}
        </td>
      </tr>`).join('')}
    </table>
    <p style="margin-top:24px;font-size:13px;color:#6B7280;border-top:1px solid #F0F2F8;padding-top:16px">
      감사합니다.<br><b style="color:#15237A">파리크라상 사업지원팀</b>
    </p>
  </div>
</div>`;

  try {
    const res = await fetch(SCRIPT_URL, {
      method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({ action:'send_email', to, subject, body, htmlBody })
    });
    const json = await res.json();
    if (json.ok) { closeModal(); alert(`✅ ${to.length}명에게 발송 완료!`); }
    else alert('발송 실패: '+(json.error||'알 수 없는 오류'));
  } catch(e) { alert('발송 실패: '+e.message); }
  finally { btn.disabled=false; btn.textContent='발송하기'; }
}
</script>
</body>
</html>
