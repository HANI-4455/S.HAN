<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>기획전 상세페이지 포맷 제작기</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f3f5f8;
      color: #1f2937;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: #102a66;
      color: #fff;
      padding: 16px 20px;
      font-weight: 900;
      letter-spacing: -0.3px;
    }
    .wrap {
      max-width: 1080px;
      margin: 0 auto;
      padding: 24px 16px 64px;
    }
    .panel {
      background: #fff;
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 18px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.07);
    }
    h2 {
      margin: 0 0 8px;
      font-size: 20px;
      color: #102a66;
    }
    .hint {
      margin: 0 0 14px;
      font-size: 13px;
      color: #6b7280;
      line-height: 1.5;
    }
    .label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #e8eefc;
      color: #102a66;
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 10px;
    }
    .main-visual {
      width: 100%;
      min-height: 360px;
      border: 2px dashed #c9d4eb;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: linear-gradient(180deg, #f8fbff, #eef4ff);
      color: #8a98b3;
      text-align: center;
      font-weight: 700;
    }
    .main-visual img {
      width: 100%;
      display: block;
    }
    .btns {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }
    button, label.upload-btn {
      border: 0;
      border-radius: 999px;
      padding: 11px 16px;
      font-weight: 800;
      cursor: pointer;
      background: #102a66;
      color: #fff;
      font-size: 14px;
    }
    button.sub, label.sub {
      background: #eef2f7;
      color: #1f2937;
    }
    button.danger {
      background: #fff0f0;
      color: #d12b2b;
    }
    input[type="file"] { display: none; }
    input, textarea, select {
      width: 100%;
      border: 1px solid #dfe5ef;
      border-radius: 12px;
      padding: 12px;
      font-size: 14px;
      font-family: inherit;
      background: #fff;
    }
    textarea {
      min-height: 92px;
      resize: vertical;
      line-height: 1.55;
    }
    .section-card {
      border: 1px solid #e2e8f0;
      border-radius: 18px;
      padding: 16px;
      margin-top: 16px;
      background: #fbfcff;
    }
    .section-head {
      display: grid;
      grid-template-columns: 1fr 160px;
      gap: 10px;
      margin-bottom: 14px;
    }
    .product-card {
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 16px;
      margin-top: 12px;
      background: #fff;
    }
    .product-grid {
      display: grid;
      grid-template-columns: 190px 1fr;
      gap: 16px;
    }
    .product-image {
      width: 100%;
      aspect-ratio: 1 / 1;
      border: 1px dashed #cad5e6;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #f8fafc;
      color: #9aa6b8;
      font-size: 13px;
      text-align: center;
      font-weight: 700;
    }
    .product-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .fields {
      display: grid;
      gap: 10px;
    }
    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .preview-area {
      background: #edf5ff;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid #d9e6fb;
    }
    .preview-main {
      min-height: 260px;
      background: #dcecff;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #8090aa;
      font-weight: 800;
      text-align: center;
    }
    .preview-main img {
      width: 100%;
      display: block;
    }
    .preview-section {
      padding: 28px 18px 8px;
    }
    .preview-section-title {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: #102a66;
      font-weight: 950;
      font-size: 25px;
      text-align: center;
      margin: 6px 0 20px;
      white-space: pre-line;
    }
    .preview-section-title::before,
    .preview-section-title::after {
      content: "";
      height: 1px;
      background: #b9c9e8;
      flex: 1;
      max-width: 160px;
    }
    .preview-products {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      max-width: 900px;
      margin: 0 auto 28px;
    }
    .preview-product {
      background: transparent;
      text-align: center;
      padding: 8px;
    }
    .badge {
      display: inline-block;
      background: #102a66;
      color: #fff;
      border-radius: 999px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 900;
      margin-bottom: 8px;
    }
    .preview-product img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: contain;
      border-radius: 12px;
      background: rgba(255,255,255,0.55);
      margin-bottom: 10px;
    }
    .preview-product h3 {
      margin: 0 0 8px;
      font-size: 19px;
      font-weight: 950;
      color: #16265a;
      white-space: pre-line;
    }
    .preview-product p {
      margin: 0 0 10px;
      color: #333;
      line-height: 1.55;
      font-size: 14px;
      white-space: pre-line;
    }
    .price {
      font-size: 18px;
      font-weight: 950;
      color: #111827;
      margin-bottom: 10px;
    }
    .cta {
      display: inline-block;
      width: 80%;
      max-width: 260px;
      background: #102a66;
      color: #fff;
      border-radius: 999px;
      padding: 10px 12px;
      font-weight: 900;
      font-size: 14px;
      text-decoration: none;
    }
    .empty {
      color: #9aa6b8;
      text-align: center;
      padding: 28px;
      border: 1px dashed #cfd8e8;
      border-radius: 14px;
      font-weight: 800;
      background: rgba(255,255,255,0.5);
    }
    @media (max-width: 720px) {
      .section-head,
      .product-grid,
      .field-row {
        grid-template-columns: 1fr;
      }
      .main-visual { min-height: 240px; }
      .preview-products {
        grid-template-columns: 1fr;
      }
      .preview-section-title {
        font-size: 22px;
      }
    }
  </style>
</head>
<body>
  <header>기획전 상세페이지 포맷 제작기</header>

  <main class="wrap">
    <section class="panel">
      <span class="label">KEY VISUAL AREA</span>
      <h2>1. 키비주얼 영역</h2>
      <p class="hint">기획전 최상단 메인 이미지를 등록합니다. 4월 상세페이지처럼 첫 화면에서 행사 콘셉트를 보여주는 영역입니다.</p>
      <div id="mainVisual" class="main-visual">키비주얼 이미지를 업로드해주세요</div>
      <div class="btns">
        <label class="upload-btn" for="mainUpload">키비주얼 업로드</label>
        <input id="mainUpload" type="file" accept="image/*" />
        <button class="danger" onclick="removeMainImage()">키비주얼 삭제</button>
      </div>
    </section>

    <section class="panel">
      <span class="label">PRODUCT SECTION AREA</span>
      <h2>2. 상품 섹션 구성</h2>
      <p class="hint">섹션 제목을 만들고, 그 아래에 상품 이미지 / 상품명 / 설명 / 가격 / 버튼문구를 입력합니다.</p>
      <button onclick="addSection()">+ 섹션 추가</button>
      
        <button onclick="downloadFigmaSvg()">Figma용 SVG 다운로드</button>

      <div id="sectionList"></div>
    </section>

    <section class="panel">
      <span class="label">LIVE PREVIEW</span>
      <h2>3. 상세페이지 미리보기</h2>
      <p class="hint">입력한 내용이 실제 상세페이지 형태로 바로 반영됩니다.</p>
      <div class="preview-area">
        <div id="previewMain" class="preview-main">키비주얼 미리보기</div>
        <div id="previewSections"></div>
      </div>
    </section>
  </main>

  <script>
    const state = {
      mainImage: "",
      sections: []
    };

    const mainUpload = document.getElementById("mainUpload");
    const mainVisual = document.getElementById("mainVisual");
    const sectionList = document.getElementById("sectionList");
    const previewMain = document.getElementById("previewMain");
    const previewSections = document.getElementById("previewSections");

    mainUpload.addEventListener("change", function(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(event) {
        state.mainImage = event.target.result;
        render();
      };
      reader.readAsDataURL(file);
    });

    function removeMainImage() {
      state.mainImage = "";
      mainUpload.value = "";
      render();
    }

    function addSection() {
      state.sections.push({
        title: "가정의달 대표케이크",
        bg: "#edf5ff",
        products: []
      });
      render();
    }

    function removeSection(sectionIndex) {
      state.sections.splice(sectionIndex, 1);
      render();
    }

    function updateSection(sectionIndex, key, value) {
      state.sections[sectionIndex][key] = value;
      renderPreviewOnly();
    }

    function addProduct(sectionIndex) {
      state.sections[sectionIndex].products.push({
        image: "",
        badge: "",
        name: "",
        desc: "",
        price: "",
        cta: "주문하러 가기",
        link: ""
      });
      render();
    }

    function removeProduct(sectionIndex, productIndex) {
      state.sections[sectionIndex].products.splice(productIndex, 1);
      render();
    }

    function updateProduct(sectionIndex, productIndex, key, value) {
      state.sections[sectionIndex].products[productIndex][key] = value;
      renderPreviewOnly();
    }

    function uploadProductImage(sectionIndex, productIndex, input) {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(event) {
        state.sections[sectionIndex].products[productIndex].image = event.target.result;
        render();
      };
      reader.readAsDataURL(file);
    }

    function removeProductImage(sectionIndex, productIndex) {
      state.sections[sectionIndex].products[productIndex].image = "";
      render();
    }

    function formatPrice(value) {
      if (!value) return "";
      const number = value.replace(/[^0-9]/g, "");
      if (!number) return value;
      return Number(number).toLocaleString("ko-KR") + "원";
    }

    function render() {
      mainVisual.innerHTML = state.mainImage
        ? `<img src="${state.mainImage}" alt="키비주얼 이미지" />`
        : "키비주얼 이미지를 업로드해주세요";

      sectionList.innerHTML = state.sections.map((s, si) => `
        <div class="section-card">
          <span class="label">TITLE AREA</span>
          <div class="section-head">
            <input placeholder="섹션 제목 예: 우리 아이를 위한 특별한 선물" value="${escapeHtml(s.title)}" oninput="updateSection(${si}, 'title', this.value)" />
            <input type="color" value="${escapeHtml(s.bg)}" oninput="updateSection(${si}, 'bg', this.value)" title="섹션 배경색" />
          </div>

          <div class="btns">
            <button onclick="addProduct(${si})">+ 상품 추가</button>
            <button class="danger" onclick="removeSection(${si})">섹션 삭제</button>
          </div>

          ${s.products.map((p, pi) => `
            <div class="product-card">
              <span class="label">PRODUCT IMAGE / TEXT AREA</span>
              <div class="product-grid">
                <div>
                  <div class="product-image">
                    ${p.image ? `<img src="${p.image}" alt="상품 이미지" />` : "상품 이미지 영역"}
                  </div>
                  <div class="btns">
                    <label class="upload-btn sub" for="productUpload${si}_${pi}">상품 이미지 업로드</label>
                    <input id="productUpload${si}_${pi}" type="file" accept="image/*" onchange="uploadProductImage(${si}, ${pi}, this)" />
                    <button class="danger" onclick="removeProductImage(${si}, ${pi})">이미지 삭제</button>
                  </div>
                </div>

                <div class="fields">
                  <div class="field-row">
                    <input placeholder="뱃지 예: BEST / NEW" value="${escapeHtml(p.badge)}" oninput="updateProduct(${si}, ${pi}, 'badge', this.value)" />
                    <input placeholder="버튼문구 예: 주문하러 가기 / coming soon!" value="${escapeHtml(p.cta)}" oninput="updateProduct(${si}, ${pi}, 'cta', this.value)" />
                  </div>
                  <input placeholder="상품명" value="${escapeHtml(p.name)}" oninput="updateProduct(${si}, ${pi}, 'name', this.value)" />
                  <textarea placeholder="상품설명" oninput="updateProduct(${si}, ${pi}, 'desc', this.value)">${escapeHtml(p.desc)}</textarea>
                  <input placeholder="가격 예: 32000" value="${escapeHtml(p.price)}" oninput="updateProduct(${si}, ${pi}, 'price', this.value)" />
                  <input placeholder="구매페이지 URL 예: https://www.paris.co.kr/products/..." value="${escapeHtml(p.link)}" oninput="updateProduct(${si}, ${pi}, 'link', this.value)" />
                  <div class="btns">
                    <button class="danger" onclick="removeProduct(${si}, ${pi})">상품 삭제</button>
                  </div>
                </div>
              </div>
            </div>
          `).join("")}
        </div>
      `).join("");

      renderPreviewOnly();
    }

    function renderPreviewOnly() {
      previewMain.innerHTML = state.mainImage
        ? `<img src="${state.mainImage}" alt="키비주얼 미리보기" />`
        : "키비주얼 미리보기";

      previewSections.innerHTML = state.sections.length
        ? state.sections.map(s => `
          <section class="preview-section" style="background:${escapeHtml(s.bg)}">
            <div class="preview-section-title">${escapeHtml(s.title || "섹션 제목")}</div>
            <div class="preview-products">
              ${s.products.length ? s.products.map(p => `
                <article class="preview-product">
                  ${p.badge ? `<div class="badge">${escapeHtml(p.badge)}</div>` : ""}
                  ${p.image ? `<img src="${p.image}" alt="${escapeHtml(p.name || '상품 이미지')}" />` : `<div class="empty">상품 이미지 영역</div>`}
                  <h3>${escapeHtml(p.name || "상품명 영역")}</h3>
                  <p>${escapeHtml(p.desc || "상품설명 영역")}</p>
                  ${p.price ? `<div class="price">${escapeHtml(formatPrice(p.price))}</div>` : ""}
                  ${p.link 
                    ? `<a class="cta" href="${escapeHtml(p.link)}" target="_blank" rel="noopener noreferrer">${escapeHtml(p.cta || "주문하러 가기")}</a>`
                    : `<div class="cta">${escapeHtml(p.cta || "주문하러 가기")}</div>`}
                </article>
              `).join("") : `<div class="empty">상품을 추가해주세요</div>`}
            </div>
          </section>
        `).join("")
        : `<div class="empty" style="margin:18px;">섹션을 추가해주세요</div>`;
    }

    function escapeHtml(text) {
      return String(text || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    addSection();
    addProduct(0);
    render();
  
    function downloadFigmaSvg() {
      const width = 1080;
      let y = 0;
      let svg = `
<svg xmlns="http://www.w3.org/2000/svg" width="${width}" height="3000" viewBox="0 0 ${width} 3000">
  <rect width="1080" height="3000" fill="#edf5ff"/>
`;

      if (state.mainImage) {
        svg += `
  <image href="${state.mainImage}" x="0" y="0" width="1080" height="520" preserveAspectRatio="xMidYMid slice"/>
`;
        y = 560;
      } else {
        svg += `
  <rect x="40" y="40" width="1000" height="420" rx="24" fill="#dcecff"/>
  <text x="540" y="260" text-anchor="middle" font-size="36" font-weight="800" fill="#102a66">KEY VISUAL AREA</text>
`;
        y = 520;
      }

      state.sections.forEach(section => {
        svg += `
  <rect x="0" y="${y}" width="1080" height="90" fill="${section.bg || '#edf5ff'}"/>
  <text x="540" y="${y + 58}" text-anchor="middle" font-size="34" font-weight="900" fill="#102a66">${escapeXml(section.title || '섹션 제목')}</text>
`;
        y += 120;

        section.products.forEach((p, index) => {
          const col = index % 2;
          const rowX = col === 0 ? 70 : 570;
          if (index % 2 === 0 && index !== 0) y += 500;

          svg += `
  <g>
    ${p.badge ? `<rect x="${rowX + 180}" y="${y}" width="90" height="34" rx="17" fill="#102a66"/>
    <text x="${rowX + 225}" y="${y + 23}" text-anchor="middle" font-size="16" font-weight="800" fill="#ffffff">${escapeXml(p.badge)}</text>` : ''}
    ${p.image ? `<image href="${p.image}" x="${rowX}" y="${y + 46}" width="390" height="260" preserveAspectRatio="xMidYMid meet"/>` : `<rect x="${rowX}" y="${y + 46}" width="390" height="260" rx="20" fill="#ffffff" stroke="#cbd5e1" stroke-dasharray="10 8"/>
    <text x="${rowX + 195}" y="${y + 186}" text-anchor="middle" font-size="24" fill="#94a3b8">PRODUCT IMAGE</text>`}
    <text x="${rowX + 195}" y="${y + 350}" text-anchor="middle" font-size="28" font-weight="900" fill="#16265a">${escapeXml(p.name || '상품명')}</text>
    <text x="${rowX + 195}" y="${y + 390}" text-anchor="middle" font-size="18" fill="#333333">${escapeXml((p.desc || '상품설명').replaceAll('\\n', ' / '))}</text>
    ${p.price ? `<text x="${rowX + 195}" y="${y + 430}" text-anchor="middle" font-size="24" font-weight="900" fill="#111827">${escapeXml(formatPrice(p.price))}</text>` : ''}
    <rect x="${rowX + 70}" y="${y + 455}" width="250" height="48" rx="24" fill="#102a66"/>
    <text x="${rowX + 195}" y="${y + 486}" text-anchor="middle" font-size="18" font-weight="800" fill="#ffffff">${escapeXml(p.cta || '주문하러 가기')}</text>
    ${p.link ? `<text x="${rowX + 195}" y="${y + 525}" text-anchor="middle" font-size="13" fill="#475569">${escapeXml(p.link)}</text>` : ''}
  </g>
`;
        });

        y += Math.max(560, Math.ceil(section.products.length / 2) * 520);
      });

      svg += `</svg>`;
      svg = svg.replace('height="3000" viewBox="0 0 1080 3000"', `height="${y + 80}" viewBox="0 0 1080 ${y + 80}"`);

      const blob = new Blob([svg], { type: "image/svg+xml;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "figma_import_event_detail.svg";
      a.click();
      URL.revokeObjectURL(url);
    }

    function escapeXml(text) {
      return String(text || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&apos;");
    }

  </script>
</body>
</html>
